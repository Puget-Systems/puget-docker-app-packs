services:
  # 1. Inference Engine
  inference:
    image: intelanalytics/ipex-llm-inference-cpp-xpu:latest
    container_name: puget_ollama
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    shm_size: "2g"
    ports:
      - "11434:11434"
    environment:
      - ZES_ENABLE_SYSMAN=1
      - SYCL_DEVICE_FILTER=level_zero:gpu
      # Optional: Route model downloads through Squid cache proxy
      # Set CACHE_PROXY in .env (e.g. CACHE_PROXY=http://172.19.69.x:3128)
      - HTTPS_PROXY=${CACHE_PROXY:-}
      - HTTP_PROXY=${CACHE_PROXY:-}
      - NO_PROXY=localhost,127.0.0.1,0.0.0.0
      - no_proxy=localhost,127.0.0.1,0.0.0.0
      # Default context window cap (prevents 256K models from exhausting system RAM)
      # Override in .env: OLLAMA_NUM_CTX=65536
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-32768}
    volumes:
      - ollama_data:/root/.ollama
    ipc: host

  # 2. User Interface
  ui:
    image: ghcr.io/open-webui/open-webui:v0.8.10
    container_name: puget_personal_webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://inference:11434
      - WEBUI_AUTH=false
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - inference

  # 3. Swarm Brain (Optional/Advanced)
  brain:
    build:
      context: brain
      dockerfile: Dockerfile
    container_name: puget_personal_brain
    restart: unless-stopped
    volumes:
      # Mount source code for easy editing
      - ./src:/home/puget-app-pack/app
    depends_on:
      - inference
    environment:
      - OLLAMA_HOST=http://inference:11434
    # Keep alive for interactive exec
    command: ["tail", "-f", "/dev/null"]

volumes:
  ollama_data:
  open_webui_data:
