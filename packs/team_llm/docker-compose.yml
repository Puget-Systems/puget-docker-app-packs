services:
  # 1. Inference Engine (vLLM)
  inference:
    # Standard upstream image (used for all models except Gemma 4).
    # For Gemma 4: run `docker compose build inference` once to produce
    # puget-vllm-gemma4:latest using Dockerfile.gemma4, then set
    # VLLM_IMAGE=puget-vllm-gemma4:latest in .env.
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    build:
      context: .
      dockerfile: Dockerfile.gemma4
      args:
        VLLM_BASE_IMAGE: vllm/vllm-openai:latest
      # Only invoked when you explicitly run `docker compose build inference`.
      # Normal `docker compose up` skips the build if the image already exists.
    container_name: puget_vllm
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8000:8000"
    environment:
      # Optional: Route model downloads through Squid cache proxy
      - HTTPS_PROXY=${CACHE_PROXY:-}
      - HTTP_PROXY=${CACHE_PROXY:-}
      - NO_PROXY=localhost,127.0.0.1,0.0.0.0
      - no_proxy=localhost,127.0.0.1,0.0.0.0
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - vllm_cache:/root/.cache/huggingface
    ipc: host
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >
        exec python3 -m vllm.entrypoints.openai.api_server
        --model=${MODEL_ID:-cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit}
        --tensor-parallel-size=${GPU_COUNT:-1}
        ${MAX_CONTEXT:+--max-model-len=${MAX_CONTEXT}}
        --gpu-memory-utilization=${GPU_MEMORY_UTILIZATION:-0.90}
        --max-num-seqs=32
        --dtype=${DTYPE:-auto}
        --trust-remote-code
        --disable-custom-all-reduce
        ${REASONING_ARGS:-}
        ${THINKING_ARGS:-}
        ${TOOL_CALL_ARGS:-}
        ${EXTRA_VLLM_ARGS:-}

  # 2. User Interface (Open WebUI)
  ui:
    image: ghcr.io/open-webui/open-webui:v0.8.10
    container_name: puget_team_webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      # Connect to vLLM as an OpenAI-compatible backend
      - OPENAI_API_BASE_URL=http://inference:8000/v1
      - OPENAI_API_KEY=not-needed
      - WEBUI_AUTH=false
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - inference

  # 3. Swarm Brain (Optional/Advanced)
  brain:
    build:
      context: brain
      dockerfile: Dockerfile
    container_name: puget_team_brain
    restart: unless-stopped
    volumes:
      - ./src:/home/puget-app-pack/app
    depends_on:
      - inference
    environment:
      - OPENAI_API_BASE=http://inference:8000/v1
      - OPENAI_API_KEY=not-needed
    command: ["tail", "-f", "/dev/null"]

volumes:
  vllm_cache:
  open_webui_data:
